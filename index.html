
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIA Lucky Wheel</title>
<link rel="icon" type="image/jpeg" href="image/logo.jpg">

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#c8f06b,#5fd7ec);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    flex-direction:column;
    color:white;
}

.container{
    position:relative;
    display:none;
    margin-top:20px;
}

.pointer{
    width:0;height:0;
    border-left:18px solid transparent;
    border-right:18px solid transparent;
    border-top:35px solid yellow;
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:-10px;
    z-index:10;
}

canvas{
    width:320px;
    height:320px;
    border-radius:50%;
    border:6px solid #F4C542;
    transition:transform 5s cubic-bezier(.17,.67,.13,1);
    background:white;
}

input{
    padding:12px;
    width:260px;
    margin:6px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#ffd700;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

#result{
    margin-top:20px;
    font-size:18px;
    text-align:center;
}

.box{
    text-align:center;
}
.logo{
    text-align:center;
    margin-bottom:15px;
}

.logo img{
    width:180px;
    height:auto;
    display:block;
    margin:0 auto;
}
.logo-wheel{
    text-align:center;
    margin-bottom:-15px;
    transform: translateY(-90px);
}

.logo-wheel img{
    width:180px;
    height:auto;
    display:block;
    margin:0 auto;
}
.my-popup{
    background: linear-gradient(135deg, #c8f06b, #5fd7ec) !important;
    border-radius: 20px;
}

.my-popup .swal2-title{
    color: #fff;
}

.my-popup .swal2-html-container{
    color: #fff;
}
.footer{
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: rgba(255,255,255,.8);
    letter-spacing: 0.5px;
}
.wheel-wrapper{
    position: relative;
    width: 320px;
    height: 320px;
    margin: 0 auto;
}

.center-logo{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:60px;
    height:60px;
    background:#fff;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:100;
    box-shadow:0 4px 10px rgba(0,0,0,.25);
}

.center-logo img{
    width:42px;
    height:42px;
    object-fit:contain;
}
canvas:not(#wheel){
    width:auto !important;
    height:auto !important;
    border:none !important;
    border-radius:0 !important;
    background:transparent !important;
}
.my-popup .swal2-confirm{
    border-radius:30px !important;
    padding:12px 30px !important;
    font-size:16px !important;
    font-weight:bold;
}
.my-popup{
    background: linear-gradient(135deg,#c8f06b,#5fd7ec) !important;
    border:4px solid #FFD700;
    border-radius:40px !important;
    padding:30px !important;
    box-shadow:
        0 15px 35px rgba(0,0,0,.25),
        inset 0 1px 0 rgba(255,255,255,.5);
}
</style>

</head>
<body>

<div class="box" id="formBox">
    <div class="logo">
        <img src="image/logo1.png" alt="AIA Logo">
    </div>
    <h2>AIA LUCKY WHEEL</h2>
    <input id="name" placeholder="Họ tên">
    <input id="phone" placeholder="Số điện thoại">
    <br><button onclick="start()">BẮT ĐẦU</button>
</div>

<div class="container" id="gameBox">
    <div class="logo-wheel">
        <img src="image/logo1.png" alt="AIA Logo">
    </div>
    <div class="wheel-wrapper">

         <canvas id="wheel" width="320" height="320"></canvas>
        <div class="center-logo">
             <img src="image/logo1.png" alt="AIA Logo">
        </div>
    </div>    
</div>

<button id="spinBtn" style="display:none; margin-top: 30px;" onclick="spin()">QUAY</button>

<div id="result"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxsIwR7aTEb5HYtFGRzg4iXXGwA94ckpHaJLHtHwtUNSy1-RQg8Gjnd0SNqEqemwE3uBQ/exec";

const prizes = [
"GIẢM 4,500,000 HỌC PHÍ",
"GIẢM 4,800,000 HỌC PHÍ",
"GIẢM 5,300,000 HỌC PHÍ",
"GIẢM 6,000,000 HỌC PHÍ",
"GIẢM 7,000,000 HỌC PHÍ"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const radius = 160;
const arc = 2 * Math.PI / prizes.length;
const colors = [
    "#0072CE",
    "#00A651",
    "#8E44AD",
    "#E53935",
    "#F39C12"
];

let rotation = 0;
let playerName = "";
let playerPhone = "";
let resultPrize = "";

function draw(){
    for(let i=0;i<prizes.length;i++){
        ctx.beginPath();
        ctx.fillStyle = colors[i];
        ctx.moveTo(radius,radius);
        ctx.arc(radius,radius,radius,i*arc,(i+1)*arc);
        ctx.fill();

        ctx.save();

        ctx.translate(radius, radius);
        ctx.rotate(i * arc + arc / 2);

        ctx.textAlign= "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle= "#fff";
        ctx.font = "bold 10px Arial";
        // tách text an toàn
        // const text = prizes[i];
        const text = prizes[i].replace("GIẢM ","");

        ctx.fillText("GIẢM", radius * 0.55,-10);
        ctx.fillText(text, radius * 0.55, 8);
        ctx.fillText("HỌC PHÍ", radius* 0.55, 22);

       // const text = prizes[i].repeat(" HỌC PHÍ","")
       // const text = prizes[i] + " HỌC PHÍ";
       // const parts = text.split(" ");

       // ctx.fillText(parts[0], 95, -10);
       // ctx.fillText(parts[1], 95, 10);
        //ctx.fillText("HỌC PHÍ", 95, 30);

        ctx.restore();
        
    }
}
draw();

function start(){
    playerName = document.getElementById("name").value;
    playerPhone = document.getElementById("phone").value;

    if(!playerName || !playerPhone){
        alert("Nhập đầy đủ thông tin");
        return;
    }

    document.getElementById("formBox").style.display="none";
    document.getElementById("gameBox").style.display="block";
    document.getElementById("spinBtn").style.display="block";
}

async function spin(){

    document.getElementById("spinBtn").disabled = true;
    document.getElementById("result").innerHTML = "Đang xử lý...";

    const res = await fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"spin",
            name:playerName,
            phone:playerPhone
        })
    });

    const data = await res.json();
    console.log("API trả:", data.prize);

    if(!data.success){
        document.getElementById("result").innerHTML = data.message;
        document.getElementById("spinBtn").disabled = false;
        return;
    }

    resultPrize = data.prize;

   // const index = prizes.indexOf(resultPrize);
   // const degreePer = 360 / prizes.length;

   // const stopAngle = 360 - (index * degreePer) - degreePer/2 + 72;

   // rotation += 360*5 + stopAngle;

   // canvas.style.transform = `rotate(${rotation}deg)`;
 
const index = prizes.indexOf(resultPrize);
const degreePer = 360 / prizes.length;

// Góc mục tiêu
const target = 360 - (index * degreePer + degreePer / 2);

// Luôn tính từ góc hiện tại
const current = ((rotation % 360) + 360) % 360;

let diff = target - current;
if (diff < 0) diff += 360;

rotation += 360 * 5 + diff;

canvas.style.transform = `rotate(${rotation}deg)`;

    setTimeout(()=>{
        console.log("Hiển thị:", resultPrize);
        document.getElementById("result").innerHTML =
        `
        🏆 CHÚC MỪNG 🏆<br><br>
        <b>${playerName}</b><br>
        ${playerPhone}<br><br>
        <h2 style="text-shadow: 0 0 8px rgba(0,0,0,0.4);">${resultPrize}</h2>
        `;
        // Swal.fire({
        //     title: "🎉Chúc mừng!",
        //     html: `
        //         <b>${playerName}</b><br>
        //         ${playerPhone}<br><br>
        //     <h2 style="color:#c8102e;">${resultPrize}</h2>
        // `,
        // icon: "Success",
        // background: "#c8f06b",
        // confimButtonText: "Nhận thưởng",
        // confirmButtonColor: "#c8102e",
        // allowOutsideClick: false,

        // customClass: {
        //     popup: "my-popup"
        // }
        // });
        Swal.fire({
    width: 400,
    background: "linear-gradient(135deg,#c8f06b,#5fd7ec)",
    showConfirmButton: true,
    confirmButtonText: "Nhận thưởng",
    confirmButtonColor: "#C8102E",
    allowOutsideClick: false,

    html: `
        <img src="image/logo1.png" style="width:140px;margin-bottom:12px;">

        <h1 style="
            color:white;
            text-shadow: 0 0 8px rgba(0,0,0,0.4);
            margin:0;
            font-size:28px;
        ">
            🏆 CHÚC MỪNG 🏆
        </h1>

        <p style="
            color:white;
            text-shadow: 0 0 8px rgba(0,0,0,0.4);
            font-size:18px;
            margin:20px 0 5px;
        ">
            ${playerName}
        </p>

        <p style="
            color:white;
            text-shadow: 0 0 8px rgba(0,0,0,0.4);
            font-size:18px;
            margin:0;
        ">
            ${playerPhone}
        </p>

        <div style="
            margin:25px 0;
           
            padding:18px;
            
        ">
            <div style="
                color:#C8102E;
                font-size:14px;
                font-weight:bold;
            ">
                PHẦN THƯỞNG
            </div>

            <div style="
                font-size:26px;
                font-weight:bold;
                color:#005BAC;
                margin-top:10px;
            ">
                ${resultPrize}
            </div>
        </div>
    `,
    didOpen: () => {

        // Pháo giấy bắn từ bên trái
        confetti({
            particleCount: 120,
            angle: 60,
            spread: 80,
            origin: { x: 0, y: 0.7 }
        });

        // Pháo giấy bắn từ bên phải
        confetti({
            particleCount: 120,
            angle: 120,
            spread: 80,
            origin: { x: 1, y: 0.7 }
        });

        // Pháo giấy bắn từ giữa
        confetti({
            particleCount: 80,
            spread: 120,
            origin: { y: 0.5 }
        });

    }
});

        document.getElementById("spinBtn").disabled = false;

    },5200);
}

</script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<div class="footer" style="text-shadow: 0 0 8px rgba(0,0,0,0.4);">
    Designed & Developed by Synd
</div>
</body>
</html>
